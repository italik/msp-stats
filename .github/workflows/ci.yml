name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Install deps
        run: npm install
      - name: Check Astro
        run: npm run check
      - name: Build Astro
        run: npm run build
      - name: Run smoke tests
        run: npm run test
