name: Daily Publish

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HALOPSA_BASE_URL: ${{ secrets.HALOPSA_BASE_URL }}
      HALOPSA_CLIENT_ID: ${{ secrets.HALOPSA_CLIENT_ID }}
      HALOPSA_CLIENT_SECRET: ${{ secrets.HALOPSA_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22.x"
          cache: npm
      - uses: actions/configure-pages@v5
      - name: Install deps
        run: npm ci
      - name: Build snapshot and site
        run: npm run publish:daily
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
